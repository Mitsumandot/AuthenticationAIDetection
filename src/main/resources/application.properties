spring.application.name=AuthenticationForAIDetection
spring.datasource.url=jdbc:postgresql://ep-hidden-brook-abrr1oqt-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

security.jwt.secret-key =${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${APP_PASSWORD}
logging.level.org.springframework.security=DEBUG
spring.config.import=optional:file:.env[.properties]

model.api.url=http://localhost:8000